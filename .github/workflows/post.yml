name: morestayz auto-publish

on:
  schedule:
    - cron: '0 21 * * *'   # 매일 06:00 KST — 하루 1회 묶음 배포(빌드 1회)
  workflow_dispatch:
    inputs:
      batch:
        description: '이번 실행 발행 수'
        required: false
        default: '3'

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate + build (batched)
        env:
          BATCH: ${{ github.event.inputs.batch || '3' }}
        run: node publish.js

      - name: Commit & push if changed
        run: |
          git config user.name "morestayz-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: auto-publish $(date -u +%Y-%m-%d)"
            git pull --rebase -X ours origin main || true
            git push
          else
            echo "변경 없음 — 스킵"
          fi
