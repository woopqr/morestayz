  footer{max-width:1080px;margin:30px auto 0;padding:22px 20px;border-top:1px solid var(--line);color:var(--muted);font-size:.82rem;text-align:center}
  footer a{margin:0 4px}

<script>
  function __mzToggle(){var r=document.documentElement;var cur=r.getAttribute('data-theme');var eff=cur||(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');var next=eff==='dark'?'light':'dark';r.setAttribute('data-theme',next);try{localStorage.setItem('mz-theme',next);}catch(e){}}
  (function(){var q=document.getElementById('q'),nr=document.getElementById('noresult');if(!q)return;
    var cards=[].slice.call(document.querySelectorAll('#article-list .card'));
    q.addEventListener('input',function(){var v=q.value.trim().toLowerCase(),n=0;
      cards.forEach(function(c){var hit=!v||c.textContent.toLowerCase().indexOf(v)>=0;c.style.display=hit?'':'none';if(hit)n++;});
      if(nr)nr.style.display=(n===0&&v)?'block':'none';});
  })();
</script>
