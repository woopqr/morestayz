<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>morestayz</title>
  <meta name="description" content="morestayz — coming soon" />
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #f5f5f5;
      text-align: center;
      padding: 24px;
    }
    .card { max-width: 520px; }
    .logo {
      font-size: clamp(40px, 9vw, 72px);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }
    .logo span { color: #4ea8de; }
    .tagline {
      font-size: clamp(16px, 3.5vw, 20px);
      color: #c9c9d4;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .badge {
      display: inline-block;
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #e0e0e8;
    }
    footer {
      position: fixed;
      bottom: 20px;
      left: 0; right: 0;
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }
    a { color: #4ea8de; text-decoration: none; }
  </style>
</head>
<body>
  <main class="card">
    <h1 class="logo">more<span>stayz</span></h1>
    <p class="tagline">곧 새로운 모습으로 찾아옵니다.<br />A better way to stay.</p>
    <span class="badge">Coming&nbsp;Soon</span>
  </main>
  <footer>&copy; 2026 morestayz · <a href="mailto:hello@morestayz.com">hello@morestayz.com</a></footer>
</body>
</html>
